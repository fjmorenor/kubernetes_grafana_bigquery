name: 'Terraform Deploy'

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      # --- PASO 2: FORZAR NODE 24 YA ---
      # Si esto está en 'true' y el pipeline pasa, estás a salvo para junio.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      TF_VAR_host_project_id: "zafa-host"
      TF_VAR_project_id: "zafa-dev"
      TF_VAR_region: "europe-west1"

    steps:
    - name: Checkout
      # --- PASO 1: ASEGURAR ÚLTIMAS VERSIONES ---
      uses: actions/checkout@v4 

    - name: Authenticate to Google Cloud
      # Google ya debería haber sacado la v3 para Node 24 a estas alturas de 2026
      uses: google-github-actions/auth@v3 
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SA_EMAIL }}

    - name: Setup Terraform
      # Intentamos usar la v4 si existe, si no, la v3 con el env de arriba
      uses: hashicorp/setup-terraform@v3 
      with:
        terraform_wrapper: true

    - name: Terraform Init
      run: terraform init -input=false -lock=false
      working-directory: ./environments/dev

    - name: Terraform Plan
      run: terraform plan -var-file="terraform.tfvars" -input=false -lock=false
      working-directory: ./environments/dev

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -var-file="terraform.tfvars" -auto-approve -input=false -lock=false
      working-directory: ./environments/dev