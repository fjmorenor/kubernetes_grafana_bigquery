name: 'Terraform Deploy'

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      # Ya no necesitas la variable FORCE_... porque usaremos versiones nativas
      TF_VAR_host_project_id: "zafa-host"
      TF_VAR_project_id: "zafa-dev"
      TF_VAR_region: "europe-west1"

    steps:
    - name: Checkout
      uses: actions/checkout@v4 # La v4.x actual ya soporta Node 24

    - name: Authenticate to Google Cloud
      # Actualizamos de v2 a v3 (si ya está disponible) o mantenemos v2 
      # Las versiones más recientes ya no disparan este aviso
      uses: google-github-actions/auth@v3 
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SA_EMAIL }}

    - name: Setup Terraform
      # Actualizamos a v3.1+ que incluye soporte nativo para Node 24
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: true

    - name: Terraform Init
      run: terraform init -input=false -lock=false
      working-directory: ./environments/dev

    - name: Terraform Plan
      run: terraform plan -var-file="terraform.tfvars" -input=false -lock=false
      working-directory: ./environments/dev

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -var-file="terraform.tfvars" -auto-approve -input=false -lock=false
      working-directory: ./environments/dev