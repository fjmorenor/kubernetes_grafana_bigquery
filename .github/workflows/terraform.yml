name: 'Terraform Deploy'

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      # ESTO ELIMINA EL WARNING: Fuerza el uso de Node 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      # TUS VARIABLES DE SIEMPRE
      TF_VAR_host_project_id: "zafa-host"
      TF_VAR_project_id: "zafa-dev"
      TF_VAR_region: "europe-west1"
      TF_LOG: TRACE # Mantenemos esto para ver si el GKE por fin arranca

    steps:
    - name: Checkout
      uses: actions/checkout@v4 # Esta versión ya es compatible si forzamos el env arriba

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SA_EMAIL }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init -input=false -lock=false
      working-directory: ./environments/dev

    - name: Terraform Plan
      run: terraform plan -var-file="terraform.tfvars" -input=false -lock=false
      working-directory: ./environments/dev
      timeout-minutes: 10

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -var-file="terraform.tfvars" -auto-approve -input=false -lock=false
      working-directory: ./environments/dev